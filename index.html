<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Janken</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
</head>

<body>
    <div class="container">
        <div class="title-bar">
            <div>
                <img src="assets/logo.png" alt="Janken" height="250px">
            </div>
        </div>
        <div class="game-bar">
            <h2 id="result">-</h2>
            <h3 id="scores">0 - 0</h3>
            <div class="anime-container">
                <div class="anime-screen">
                    <img id="playerHand" class="animation" src="assets/rock.png" alt="player-hand" height="150px;">
                </div>
                <div class="anime-screen">
                    <img id="compHand" class="animation" src="assets/rock.png" alt="computer-hand" height="150px;">
                </div>
            </div>

            <div>
                <button class="choiceButton" value="rock">ぐー</button>
                <button class="choiceButton" value="scissors">チョキ</button>
                <button class="choiceButton" value="paper">パー</button>
            </div>
        </div>
        <div class="footer">

        </div>
    </div>

</body>

</html>
